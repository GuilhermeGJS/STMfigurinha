services:
  - type: web
    name: stickershop
    runtime: node
    plan: starter
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma db push --skip-generate
      npx tsx prisma/seed.ts
      npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stickershop-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://stickershop.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: stickershop-db
    plan: free
